<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet Family - Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow-sm p-4 border-0" style="width: 100%; max-width: 400px;">
        <h2 class="text-center text-primary mb-4 fw-bold">Wallet Family 💰</h2>
        
        <div id="error-container" class="d-none alert alert-danger shadow-sm small py-2 text-center"></div>
        
        <div id="premium-banner" class="d-none alert alert-primary border-0 shadow-sm small py-2 text-center mb-3">
            <i class="bi bi-lightning-charge-fill me-1"></i>
            Inicia sesión para activar tu plan <strong>Premium</strong>
        </div>

        <form id="loginForm">
            <div class="mb-3">
                <label for="email" class="form-label text-secondary">Correo Electrónico</label>
                <input type="email" class="form-control" id="email" name="email" required placeholder="tu@correo.com">
            </div>

            <div class="mb-4">
                <label for="password" class="form-label text-secondary">Contraseña</label>
                <input type="password" class="form-control" id="password" name="password" required placeholder="********">
            </div>

            <button type="submit" id="submitBtn" class="btn btn-primary w-100 fw-bold py-2">
                Ingresar al Sistema
            </button>
        </form>

        <div class="text-center mt-4">
            <a href="registro.html" class="text-decoration-none small text-secondary">
                ¿No tienes cuenta? <span class="text-primary fw-bold">Regístrate aquí</span>
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // 1. Detectar si la URL trae un parámetro (Ej: login.html?redirect=suscripcion)
        const urlParams = new URLSearchParams(window.location.search);
        const redirectParam = urlParams.get('redirect');

        if (redirectParam === 'suscripcion') {
            document.getElementById('premium-banner').classList.remove('d-none');
            document.getElementById('submitBtn').innerHTML = '<i class="bi bi-lightning-charge me-1"></i> Ingresar y Activar Premium';
        }

        // 2. Interceptar el envío del formulario
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault(); // Evitar que la página se recargue

            // Obtener los datos de los campos
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorContainer = document.getElementById('error-container');
            const submitBtn = document.getElementById('submitBtn');

            // Cambiar el texto del botón mientras carga
            const textoOriginal = submitBtn.innerHTML;
            submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Ingresando...';
            submitBtn.disabled = true;
            errorContainer.classList.add('d-none'); // Ocultar errores previos

            try {
                // Hacer la petición a tu backend en Laravel
                const response = await fetch('http://127.0.0.1:8000/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json' // Muy importante
                    },
                    body: JSON.stringify({ email: email, password: password })
                });

                const data = await response.json();

                if (response.ok) {
                    // ¡Login exitoso! Guardamos el Token en el navegador
                    localStorage.setItem('auth_token', data.access_token);
                    localStorage.setItem('user_role_id', data.user.role_id);
                    
                    // Si es Admin (ID 1)
                    if (data.user.id === 1) {
                        window.location.href = 'admin_suscripciones.html';
                    } 
                    // Si venía del botón Premium
                    else if (redirectParam === 'suscripcion') {
                        window.location.href = 'suscripcion.html';
                    } 
                    // Usuario normal
                    else {
                        window.location.href = 'dashboard.html';
                    }
                } else {
                    // Si hubo error de credenciales
                    errorContainer.innerText = data.error || 'Correo o contraseña incorrectos.';
                    errorContainer.classList.remove('d-none');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = textoOriginal;
                }

            } catch (error) {
                // Si el servidor de Laravel está apagado
                errorContainer.innerText = 'Error de conexión con el servidor.';
                errorContainer.classList.remove('d-none');
                submitBtn.disabled = false;
                submitBtn.innerHTML = textoOriginal;
            }
        });
    </script>
</body>
</html>
